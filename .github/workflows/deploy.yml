name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_API_KEY: ${{ secrets.VITE_GOOGLE_API_KEY }}
          VITE_SHEET_ID: ${{ secrets.VITE_SHEET_ID }}
          VITE_SLACK_PROXY_URL: ${{ secrets.VITE_SLACK_PROXY_URL }}
          VITE_SLACK_PROXY_TOKEN: ${{ secrets.VITE_SLACK_PROXY_TOKEN }}
          VITE_ANTHROPIC_API_KEY: ${{ secrets.VITE_ANTHROPIC_API_KEY }}
          VITE_GCP_PROJECT_ID: ${{ secrets.VITE_GCP_PROJECT_ID }}
          VITE_GCP_LOCATION: ${{ secrets.VITE_GCP_LOCATION }}
          VITE_GEMINI_MODEL: ${{ secrets.VITE_GEMINI_MODEL }}
          VITE_SLACK_TEAM_ID: ${{ secrets.VITE_SLACK_TEAM_ID }}
          VITE_SLACK_DOMAIN: ${{ secrets.VITE_SLACK_DOMAIN }}
          VITE_GLEAN_URL: ${{ secrets.VITE_GLEAN_URL }}

      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
