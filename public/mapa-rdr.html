<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>

<title>Mapa Neural — COMPSOL RDR</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#06000f;color:#c8b8e8;font-family:system-ui,sans-serif}

/* ── Topbar ── */
#topbar{position:fixed;top:0;left:0;right:0;height:48px;background:rgba(6,0,15,.95);border-bottom:.5px solid rgba(130,10,209,.3);display:flex;align-items:center;gap:12px;padding:0 16px;z-index:100;backdrop-filter:blur(8px)}
.tb-logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tb-hex{font-size:18px;color:#820AD1}
.tb-title{font-size:13px;font-weight:700;color:#fff}
.tb-sub{font-size:10px;color:#5a4a72}
.tb-sep{width:1px;height:20px;background:rgba(130,10,209,.25);flex-shrink:0}
.tb-filters{display:flex;gap:6px;flex:1;overflow-x:auto;scrollbar-width:none}
.tb-filters::-webkit-scrollbar{display:none}
.filter-btn{padding:3px 10px;border-radius:999px;border:.5px solid rgba(255,255,255,.15);background:transparent;color:#7a6a9a;font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;letter-spacing:.3px}
.filter-btn.active{color:#fff;border-color:currentColor}
.tb-search{position:relative;flex-shrink:0}
.tb-search input{background:rgba(130,10,209,.08);border:.5px solid rgba(130,10,209,.25);border-radius:8px;color:#c8b8e8;font-size:11px;padding:5px 10px 5px 28px;width:160px;outline:none}
.tb-search input::placeholder{color:#5a4a72}
.tb-search svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);pointer-events:none}
.tb-controls{display:flex;gap:4px;flex-shrink:0}
.tb-btn{width:28px;height:28px;border-radius:6px;border:.5px solid rgba(130,10,209,.25);background:transparent;color:#5a4a72;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all .15s}
.tb-btn:hover{color:#c8b8e8;border-color:rgba(130,10,209,.6)}

/* ── Graph SVG ── */
#graph{position:fixed;top:48px;left:0;width:100%;height:calc(100vh - 48px)}

/* ── Node styles ── */
.node-g{cursor:pointer}
.node-g .nc{stroke-width:1.5;transition:stroke-width .15s}
.node-g text{pointer-events:none;font-size:10px;fill:#c8b8e8;font-weight:600;text-shadow:0 0 8px #06000f,0 0 4px #06000f,0 1px 3px #06000f}
.node-g.dimmed .nc{opacity:.12}
.node-g.dimmed text{opacity:.08}
.link-line{stroke-opacity:.35;stroke-width:1.2;transition:all .15s}
.link-line.highlight{stroke-opacity:.9;stroke-width:2.5}
.link-line.dimmed{stroke-opacity:.04}

/* ── Detail panel ── */
#detail-panel{position:fixed;top:48px;right:0;width:320px;height:calc(100vh - 48px);background:#0d0118;border-left:.5px solid rgba(130,10,209,.3);overflow-y:auto;transform:translateX(100%);transition:transform .3s ease;z-index:50;padding:0}
#detail-panel.open{transform:translateX(0)}
.dp-header{padding:16px 20px;border-bottom:.5px solid rgba(130,10,209,.15);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:#0d0118;z-index:1}
.dp-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px}
.dp-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:999px;letter-spacing:.5px;text-transform:uppercase;display:inline-flex;align-items:center;gap:4px}
.dp-close{width:26px;height:26px;border-radius:6px;border:.5px solid rgba(130,10,209,.25);background:transparent;color:#5a4a72;cursor:pointer;font-size:14px;flex-shrink:0}
.dp-body{padding:16px 20px;display:flex;flex-direction:column;gap:14px}
.dp-desc{font-size:12px;color:#c8b8e8;line-height:1.7;padding:10px 12px;background:rgba(130,10,209,.06);border:.5px solid rgba(130,10,209,.15);border-radius:8px}
.dp-section{font-size:9px;font-weight:700;color:#5a4a72;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.dp-feature{font-size:11px;color:#c8b8e8;padding:4px 0;border-bottom:.5px solid rgba(130,10,209,.1);display:flex;align-items:center;gap:6px}
.dp-feature::before{content:'';width:4px;height:4px;border-radius:50%;background:#820AD1;flex-shrink:0}
.dp-file{font-size:10px;color:#b06aff;background:rgba(130,10,209,.1);padding:6px 10px;border-radius:6px;border:.5px solid rgba(130,10,209,.15);word-break:break-all;font-family:monospace}
.dp-conn{font-size:11px;color:#c8b8e8;padding:4px 0;display:flex;align-items:center;gap:6px;border-bottom:.5px solid rgba(130,10,209,.08)}
.dp-conn-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dp-conn-label{font-size:9px;color:#5a4a72;margin-left:auto;font-style:italic}

/* ── Legend ── */
#legend{position:fixed;bottom:16px;left:16px;z-index:50;background:rgba(13,1,24,.92);border:.5px solid rgba(130,10,209,.2);border-radius:10px;padding:10px 14px;backdrop-filter:blur(8px)}
.leg-title{font-size:9px;font-weight:700;color:#5a4a72;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.leg-item{display:flex;align-items:center;gap:7px;font-size:10px;color:#c8b8e8;padding:2px 0;cursor:pointer;transition:opacity .15s}
.leg-item:hover{opacity:.7}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── Tooltip ── */
#tooltip{position:fixed;background:rgba(13,1,24,.96);border:.5px solid rgba(130,10,209,.4);border-radius:8px;padding:8px 12px;font-size:11px;pointer-events:none;display:none;max-width:220px;line-height:1.5;backdrop-filter:blur(8px);z-index:200}
#tooltip .tt-name{font-weight:700;color:#fff;margin-bottom:2px;font-size:12px}
#tooltip .tt-desc{color:#94a3b8;font-size:10px}

/* ── Minimap ── */
#minimap{position:fixed;bottom:16px;right:16px;z-index:50;background:rgba(13,1,24,.9);border:.5px solid rgba(130,10,209,.2);border-radius:8px;overflow:hidden}
.mm-viewport{position:absolute;border:1px solid rgba(130,10,209,.7);background:rgba(130,10,209,.08);pointer-events:none}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(130,10,209,.3);border-radius:4px}
</style>

───────────────────────────────────────────── */
let _mapInited = false;
function initMap() {
  if (_mapInited) return;
  _mapInited = true;
  // Build legend
  const legendEl = document.getElementById('legend');
  legendEl.innerHTML = '<div class="leg-title">Categorias</div>' +
    Object.entries(COLORS).map(([k,v]) => {
      const label = {pagina:'Páginas',componente:'Componentes',contexto:'Contextos',hook:'Hooks',lib:'Libs',util:'Utils',gas:'Apps Script',google:'Google',uipath:'UiPath',sistema:'Sistemas',slack:'Slack',ia:'IA',fluxo:'Templates'}[k]||k;
      return `<div class="leg-item" data-cat="${k}" onclick="toggleFilter('${k}')"><div class="leg-dot" style="background:${v.s}"></div>${label}</div>`;
    }).join('');

  // Build filter buttons
  const filtersEl = document.getElementById('filters');
  filtersEl.innerHTML = Object.entries(COLORS).map(([k,v]) => {
    const label = {pagina:'Páginas',componente:'Componentes',contexto:'Contextos',hook:'Hooks',lib:'Libs',util:'Utils',gas:'Apps Script',google:'Google',uipath:'UiPath',sistema:'Sistemas',slack:'Slack',ia:'IA',fluxo:'Templates'}[k]||k;
    return `<button class="filter-btn" data-cat="${k}" style="--c:${v.s}" onclick="toggleFilter('${k}')">${label}</button>`;
  }).join('');

  // ── SVG setup ──
  const svgEl = document.getElementById('graph');
  const W = svgEl.clientWidth  || window.innerWidth;
  const H = svgEl.clientHeight || (window.innerHeight - 48);

  const svg = d3.select('#graph')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('width', W)
    .attr('height', H);

  const g = svg.append('g');

  // Zoom
  const zoom = d3.zoom().scaleExtent([.15, 5]).on('zoom', e => {
    g.attr('transform', e.transform);
    updateMinimap(e.transform);
  });
  svg.call(zoom);

  // Glow filter
  const defs = svg.append('defs');
  const filter = defs.append('filter').attr('id','glow').attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
  filter.append('feGaussianBlur').attr('stdDeviation','3').attr('result','blur');
  const fm = filter.append('feMerge');
  fm.append('feMergeNode').attr('in','blur');
  fm.append('feMergeNode').attr('in','SourceGraphic');

  // Stars bg
  for (let i=0;i<120;i++) {
    g.append('circle')
      .attr('cx', (Math.random()-0.3)*W*3)
      .attr('cy', (Math.random()-0.3)*H*3)
      .attr('r', Math.random()*1.1)
      .attr('fill','#fff')
      .attr('opacity', Math.random()*.35+.03);
  }

  // Nodes copy for simulation
  const nodes = NODES.map(n => ({...n}));
  const nodeById = new Map(nodes.map(n => [n.id, n]));
  const links = LINKS.map(l => ({source:l.s, target:l.t, lbl:l.lbl}));

  // ── Simulation ──
  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d=>d.id).distance(d => {
      const sr = nodeById.get(d.source.id||d.source)?.r || 12;
      const tr = nodeById.get(d.target.id||d.target)?.r || 12;
      return (sr+tr)*4.5;
    }).strength(.5))
    .force('charge', d3.forceManyBody().strength(d => -d.r*80))
    .force('center', d3.forceCenter(W/2, H/2).strength(.08))
    .force('collide', d3.forceCollide().radius(d => d.r+20).strength(.8))
    .alphaDecay(.02)
    .velocityDecay(.4);

  // ── Links ──
  const linkEls = g.append('g')
    .selectAll('line')
    .data(links)
    .join('line')
    .attr('class','link-line')
    .attr('stroke', d => {
      const src = nodeById.get(d.source.id||d.source);
      return COLORS[src?.cat]?.s || '#555';
    });

  // ── Nodes ──
  const nodeEls = g.append('g')
    .selectAll('g')
    .data(nodes)
    .join('g')
    .attr('class','node-g')
    .call(d3.drag()
      .on('start',(e,d)=>{ if(!e.active) sim.alphaTarget(.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (e,d)=>{ d.fx=e.x; d.fy=e.y; })
      .on('end',  (e,d)=>{ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
    )
    .on('mouseover', onHover)
    .on('mouseout',  onOut)
    .on('click',     onClick);

  // Circle
  nodeEls.append('circle')
    .attr('class','nc')
    .attr('r', d=>d.r)
    .attr('fill',   d => COLORS[d.cat]?.f || 'rgba(100,100,100,.15)')
    .attr('stroke', d => (d.warn ? '#fbbf24' : COLORS[d.cat]?.s) || '#555')
    .attr('filter','url(#glow)');

  // External dashed ring
  nodeEls.filter(d=>d.ext)
    .append('circle')
    .attr('r', d=>d.r+7)
    .attr('fill','none')
    .attr('stroke', d=>COLORS[d.cat]?.s||'#555')
    .attr('stroke-width',.5)
    .attr('stroke-dasharray','4 3')
    .attr('opacity',.3);

  // Label
  nodeEls.append('text')
    .attr('text-anchor','middle')
    .attr('dy', d=>d.r+13)
    .text(d=>d.label);

  // Tick
  sim.on('tick', () => {
    linkEls
      .attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
      .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    nodeEls.attr('transform',d=>`translate(${d.x},${d.y})`);
    updateMinimap(d3.zoomTransform(svgEl));
  });

  /* ── Interactions ── */
  const tooltip = document.getElementById('tooltip');
  let selected = null;
  let labelsOn  = true;
  let activeFilters = new Set();
  let searchTerm = '';

  function connectedSet(id) {
    const s = new Set([id]);
    links.forEach(l => {
      const src = l.source.id||l.source, tgt = l.target.id||l.target;
      if(src===id) s.add(tgt);
      if(tgt===id) s.add(src);
    });
    return s;
  }

  function highlight(id) {
    const conn = connectedSet(id);
    nodeEls.classed('dimmed', n => !conn.has(n.id));
    linkEls.classed('dimmed',    l => { const s=l.source.id||l.source,t=l.target.id||l.target; return !(s===id||t===id); });
    linkEls.classed('highlight', l => { const s=l.source.id||l.source,t=l.target.id||l.target; return s===id||t===id; });
  }

  function clearHL() {
    nodeEls.classed('dimmed',false);
    linkEls.classed('dimmed',false).classed('highlight',false);
  }

  function onHover(e, d) {
    if(selected) return;
    highlight(d.id);
    const tt = tooltip;
    tt.innerHTML = `<div class="tt-name">${d.label}</div><div class="tt-desc">${d.desc||''}</div>`;
    tt.style.display='block';
    const r = tt.getBoundingClientRect();
    let x=e.clientX+14, y=e.clientY-10;
    if(x+r.width  > window.innerWidth-10)  x=e.clientX-r.width-14;
    if(y+r.height > window.innerHeight-10) y=window.innerHeight-r.height-10;
    tt.style.left=x+'px'; tt.style.top=y+'px';
  }

  function onOut() {
    if(selected) return;
    clearHL();
    tooltip.style.display='none';
  }

  function onClick(e, d) {
    e.stopPropagation();
    if(selected===d.id){ closeDetail(); return; }
    selected=d.id;
    highlight(d.id);
    tooltip.style.display='none';
    openDetail(d);
  }

  svg.on('click', () => { if(selected) closeDetail(); });

  function openDetail(d) {
    const c = COLORS[d.cat]||{s:'#888'};
    const outL = links.filter(l=>(l.source.id||l.source)===d.id);
    const inL  = links.filter(l=>(l.target.id||l.target)===d.id);

    document.getElementById('detail-panel').innerHTML = `
      <div class="dp-header">
        <div>
          <div class="dp-badge" style="background:${c.s}22;color:${c.s};border:.5px solid ${c.s}44">
            <div style="width:6px;height:6px;border-radius:50%;background:${c.s}"></div>
            ${d.cat}${d.ext?' · externo':''}${d.warn?' ⚠':''}
          </div>
          <div class="dp-title">${d.label}</div>
        </div>
        <button class="dp-close" onclick="closeDetail()">✕</button>
      </div>
      <div class="dp-body">
        ${d.desc ? `<div class="dp-desc">${d.desc}</div>` : ''}
        ${d.features?.length ? `
          <div>
            <div class="dp-section">Funcionalidades</div>
            ${d.features.map(f=>`<div class="dp-feature">${f}</div>`).join('')}
          </div>` : ''}
        ${d.file ? `<div><div class="dp-section">Arquivo</div><div class="dp-file">${d.file}</div></div>` : ''}
        ${outL.length ? `
          <div>
            <div class="dp-section">Conecta para (${outL.length})</div>
            ${outL.map(l => {
              const tId=l.target.id||l.target, tN=nodeById.get(tId);
              const tc=COLORS[tN?.cat]||{s:'#888'};
              return `<div class="dp-conn"><div class="dp-conn-dot" style="background:${tc.s}"></div>${tN?.label||tId}<span class="dp-conn-label">${l.lbl||''}</span></div>`;
            }).join('')}
          </div>` : ''}
        ${inL.length ? `
          <div>
            <div class="dp-section">Recebe de (${inL.length})</div>
            ${inL.map(l => {
              const sId=l.source.id||l.source, sN=nodeById.get(sId);
              const sc=COLORS[sN?.cat]||{s:'#888'};
              return `<div class="dp-conn"><div class="dp-conn-dot" style="background:${sc.s}"></div>${sN?.label||sId}<span class="dp-conn-label">${l.lbl||''}</span></div>`;
            }).join('')}
          </div>` : ''}
      </div>`;
    document.getElementById('detail-panel').classList.add('open');
  }

  window.closeDetail = function() {
    selected=null; clearHL();
    document.getElementById('detail-panel').classList.remove('open');
  };

  /* ── Filters ── */
  window.toggleFilter = function(cat) {
    if(activeFilters.has(cat)) activeFilters.delete(cat); else activeFilters.add(cat);
    document.querySelectorAll(`.filter-btn[data-cat="${cat}"],.leg-item[data-cat="${cat}"]`).forEach(el => {
      el.classList.toggle('active', activeFilters.has(cat));
      if(activeFilters.has(cat)) el.style.color=COLORS[cat]?.s||'#fff';
      else el.style.color='';
    });
    applyFilters();
  };

  function applyFilters() {
    const hasF = activeFilters.size>0;
    const term = searchTerm.toLowerCase();
    const visIds = new Set();
    nodeEls.style('display', d => {
      const catOk   = !hasF || activeFilters.has(d.cat);
      const searchOk= !term || d.label.toLowerCase().includes(term) || d.id.toLowerCase().includes(term);
      const show = catOk && searchOk;
      if(show) visIds.add(d.id);
      return show ? null : 'none';
    });
    linkEls.style('display', l => {
      const s=l.source.id||l.source, t=l.target.id||l.target;
      return visIds.has(s)&&visIds.has(t) ? null : 'none';
    });
  }

  document.getElementById('search').addEventListener('input', e => {
    searchTerm=e.target.value; applyFilters();
  });

  /* ── Controls ── */
  document.getElementById('btn-in').   onclick = () => svg.transition().duration(300).call(zoom.scaleBy,1.4);
  document.getElementById('btn-out').  onclick = () => svg.transition().duration(300).call(zoom.scaleBy,.7);
  document.getElementById('btn-reset').onclick = () => svg.transition().duration(500).call(zoom.transform,d3.zoomIdentity);
  document.getElementById('btn-lbl').  onclick = () => { labelsOn=!labelsOn; nodeEls.selectAll('text').style('display',labelsOn?null:'none'); };

  /* ── Minimap ── */
  const mmCanvas = document.querySelector('#minimap canvas');
  const mmCtx    = mmCanvas.getContext('2d');
  const mmVP     = document.querySelector('.mm-viewport');
  const MW=160, MH=90;

  function updateMinimap(tr) {
    mmCtx.clearRect(0,0,MW,MH);
    const ext={mnX:Infinity,mnY:Infinity,mxX:-Infinity,mxY:-Infinity};
    nodes.forEach(n=>{ if(n.x!=null){ext.mnX=Math.min(ext.mnX,n.x);ext.mxX=Math.max(ext.mxX,n.x);ext.mnY=Math.min(ext.mnY,n.y);ext.mxY=Math.max(ext.mxY,n.y);} });
    const pad=40, gw=(ext.mxX-ext.mnX)+pad*2||1, gh=(ext.mxY-ext.mnY)+pad*2||1;
    const s=Math.min(MW/gw,MH/gh);
    links.forEach(l=>{
      if(l.source.x==null) return;
      mmCtx.strokeStyle='rgba(130,10,209,.12)'; mmCtx.lineWidth=.4;
      mmCtx.beginPath();
      mmCtx.moveTo((l.source.x-ext.mnX+pad)*s,(l.source.y-ext.mnY+pad)*s);
      mmCtx.lineTo((l.target.x-ext.mnX+pad)*s,(l.target.y-ext.mnY+pad)*s);
      mmCtx.stroke();
    });
    nodes.forEach(n=>{
      if(n.x==null) return;
      mmCtx.fillStyle=COLORS[n.cat]?.s||'#888';
      mmCtx.globalAlpha=.65;
      mmCtx.beginPath();
      mmCtx.arc((n.x-ext.mnX+pad)*s,(n.y-ext.mnY+pad)*s,Math.max(1.5,n.r*s*.4),0,Math.PI*2);
      mmCtx.fill();
      mmCtx.globalAlpha=1;
    });
    if(tr){
      const vx=(-tr.x/tr.k-ext.mnX+pad)*s, vy=(-tr.y/tr.k-ext.mnY+pad)*s;
      const vw=(W/tr.k)*s, vh=(H/tr.k)*s;
      mmVP.style.left=Math.max(0,vx)+'px'; mmVP.style.top=Math.max(0,vy)+'px';
      mmVP.style.width=Math.min(MW,vw)+'px'; mmVP.style.height=Math.min(MH,vh)+'px';
      mmVP.style.display='block';
    }
  }

  /* ── Resize ── */
  window.addEventListener('resize', () => {
    const nw=svgEl.clientWidth||window.innerWidth, nh=(svgEl.clientHeight||(window.innerHeight-48));
    svg.attr('viewBox',`0 0 ${nw} ${nh}`).attr('width',nw).attr('height',nh);
    sim.force('center',d3.forceCenter(nw/2,nh/2)).alpha(.2).restart();
  });
}

if (document.readyState === 'complete') {
  setTimeout(initMap, 0);
} else {
  window.addEventListener('load', initMap);
  document.addEventListener('DOMContentLoaded', () => setTimeout(initMap, 50));
}
</script>
</body>
</html>
