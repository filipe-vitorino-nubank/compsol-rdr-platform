<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>COMPSOL RDR — Mapa Neural</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#06000f;color:#c8b8e8;font-family:'DM Sans',system-ui,sans-serif;overflow:hidden;height:100vh;-webkit-font-smoothing:antialiased}

/* ── Topbar ── */
#topbar{position:fixed;top:0;left:0;right:0;height:48px;background:#0d0118;border-bottom:.5px solid rgba(130,10,209,.25);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100}
.tb-logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tb-hex{width:28px;height:28px;background:#820AD1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff}
.tb-title{font-size:14px;font-weight:700;color:#fff;letter-spacing:-.3px}
.tb-sub{font-size:10px;color:#5a4a72;margin-left:-4px}
.tb-sep{width:1px;height:20px;background:rgba(130,10,209,.25);flex-shrink:0}
.tb-filters{display:flex;gap:4px;flex-wrap:wrap;flex:1;overflow:hidden}
.tb-pill{font-size:10px;font-weight:600;padding:3px 10px;border-radius:999px;border:.5px solid rgba(130,10,209,.25);background:transparent;color:#5a4a72;cursor:pointer;transition:all .15s;white-space:nowrap}
.tb-pill:hover{border-color:rgba(130,10,209,.5);color:#c8b8e8}
.tb-pill.active{background:rgba(130,10,209,.2);border-color:#820AD1;color:#d8a8ff}
.tb-search{position:relative;flex-shrink:0}
.tb-search input{background:rgba(255,255,255,.05);border:.5px solid rgba(130,10,209,.25);border-radius:6px;padding:5px 10px 5px 28px;font-size:11px;color:#c8b8e8;outline:none;width:160px;font-family:inherit;transition:border-color .15s}
.tb-search input:focus{border-color:#820AD1}
.tb-search input::placeholder{color:#5a4a72}
.tb-search svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);pointer-events:none}
.tb-controls{display:flex;gap:4px;flex-shrink:0}
.tb-btn{width:28px;height:28px;border-radius:6px;border:.5px solid rgba(130,10,209,.25);background:transparent;color:#5a4a72;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:13px}
.tb-btn:hover{border-color:#820AD1;color:#c8b8e8}

/* ── Graph SVG ── */
#graph{position:fixed;top:48px;left:0;right:0;bottom:0}
.node-g{cursor:pointer}
.node-g text{pointer-events:none;font-size:10px;fill:#c8b8e8;font-weight:500;text-shadow:0 0 6px #06000f,0 0 12px #06000f}
.link-line{stroke-opacity:.25;stroke-width:1}
.link-line.highlight{stroke-opacity:.8;stroke-width:2}
.link-line.dimmed{stroke-opacity:.04}
.node-g.dimmed circle,.node-g.dimmed text{opacity:.1}

/* ── Detail Panel ── */
#detail-panel{position:fixed;top:48px;right:0;width:340px;height:calc(100vh - 48px);background:#0d0118;border-left:.5px solid rgba(130,10,209,.3);overflow-y:auto;transform:translateX(100%);transition:transform .3s ease;z-index:50;padding:0}
#detail-panel.open{transform:translateX(0)}
.dp-header{padding:16px 20px;border-bottom:.5px solid rgba(130,10,209,.18);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.dp-cat-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:999px;letter-spacing:.5px;text-transform:uppercase;display:inline-block;margin-bottom:6px}
.dp-title{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.3px}
.dp-status{font-size:10px;font-weight:600;display:inline-flex;align-items:center;gap:4px;margin-top:4px}
.dp-close{width:28px;height:28px;border-radius:6px;border:.5px solid rgba(130,10,209,.25);background:transparent;color:#5a4a72;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:14px}
.dp-close:hover{border-color:#820AD1;color:#fff}
.dp-body{padding:16px 20px;display:flex;flex-direction:column;gap:16px}
.dp-desc{font-size:12px;color:#c8b8e8;line-height:1.7}
.dp-section-title{font-size:10px;font-weight:700;color:#5a4a72;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.dp-feature{font-size:11px;color:#c8b8e8;padding:4px 0;border-bottom:.5px solid rgba(130,10,209,.1);display:flex;align-items:center;gap:6px}
.dp-feature::before{content:'';width:4px;height:4px;border-radius:50%;background:#820AD1;flex-shrink:0}
.dp-file{font-size:11px;font-family:'JetBrains Mono',monospace;color:#b06aff;background:rgba(130,10,209,.1);padding:6px 10px;border-radius:6px;border:.5px solid rgba(130,10,209,.15);word-break:break-all}
.dp-conn{font-size:11px;color:#c8b8e8;padding:3px 0;display:flex;align-items:center;gap:6px}
.dp-conn-arrow{font-size:9px;color:#5a4a72;flex-shrink:0}
.dp-conn-label{font-size:9px;color:#5a4a72;margin-left:auto}

/* ── Legend ── */
#legend{position:fixed;bottom:16px;left:16px;z-index:50;background:rgba(13,1,24,.92);border:.5px solid rgba(130,10,209,.2);border-radius:10px;padding:10px 14px;backdrop-filter:blur(8px);max-height:calc(100vh - 120px);overflow-y:auto}
.leg-title{font-size:10px;font-weight:700;color:#5a4a72;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.leg-item{display:flex;align-items:center;gap:6px;font-size:10px;color:#c8b8e8;padding:2px 0;cursor:pointer;transition:opacity .15s}
.leg-item:hover{opacity:.8}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;border:1.5px solid transparent}

/* ── Metrics Panel ── */
#metrics{position:fixed;top:60px;right:16px;z-index:40;background:rgba(13,1,24,.92);border:.5px solid rgba(130,10,209,.2);border-radius:10px;padding:12px 14px;backdrop-filter:blur(8px);min-width:170px;font-size:10px}
.met-title{font-size:10px;font-weight:700;color:#5a4a72;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.met-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0;color:#c8b8e8}
.met-val{font-family:'JetBrains Mono',monospace;color:#d8a8ff;font-weight:600}
.met-divider{height:1px;background:rgba(130,10,209,.15);margin:6px 0}
.met-url{font-size:9px;color:#b06aff;word-break:break-all;margin-top:4px;display:block;text-decoration:none}
.met-url:hover{text-decoration:underline}

/* ── Minimap ── */
#minimap{position:fixed;bottom:16px;right:16px;z-index:50;background:rgba(13,1,24,.92);border:.5px solid rgba(130,10,209,.2);border-radius:10px;overflow:hidden}
#minimap canvas{display:block}
.mm-viewport{position:absolute;border:1px solid rgba(130,10,209,.6);background:rgba(130,10,209,.08);pointer-events:none}

/* ── Tooltip ── */
#tooltip{position:fixed;background:rgba(13,1,24,.95);border:.5px solid rgba(130,10,209,.4);border-radius:8px;padding:8px 12px;font-size:11px;pointer-events:none;display:none;max-width:240px;line-height:1.5;backdrop-filter:blur(8px);z-index:200}
#tooltip .tt-name{font-weight:700;color:#fff;margin-bottom:2px}
#tooltip .tt-desc{color:#c8b8e8;font-size:10px}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(130,10,209,.3);border-radius:2px}

/* ── Animations ── */
@keyframes fadeScale{0%{opacity:0;transform:scale(.6)}100%{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<!-- Topbar -->
<div id="topbar">

    <input type="text" id="search" placeholder="Buscar nó..."/>
  </div>
  <div class="tb-controls">
    <button class="tb-btn" id="btn-zoom-in" title="Zoom in">+</button>
    <button class="tb-btn" id="btn-zoom-out" title="Zoom out">−</button>
    <button class="tb-btn" id="btn-reset" title="Centralizar">⊙</button>

/* ============================================================
   CATEGORY COLORS
   ============================================================ */
const CATEGORY_COLORS = {
  pagina:     {fill:"#3a0a80",stroke:"#820AD1",label:"Páginas"},
  componente: {fill:"#0a2a80",stroke:"#3b82f6",label:"Componentes"},
  contexto:   {fill:"#0a6040",stroke:"#22c55e",label:"Contextos"},
  hook:       {fill:"#6040a0",stroke:"#a855f7",label:"Hooks"},
  lib:        {fill:"#804020",stroke:"#f59e0b",label:"Libs"},
  util:       {fill:"#804020",stroke:"#f59e0b",label:"Utils"},
  gas:        {fill:"#406020",stroke:"#84cc16",label:"Apps Script"},
  google:     {fill:"#204060",stroke:"#38bdf8",label:"Google"},
  uipath:     {fill:"#602020",stroke:"#f87171",label:"UiPath RPA"},
  sistema:    {fill:"#403000",stroke:"#fbbf24",label:"Sistemas"},
  slack:      {fill:"#4a2060",stroke:"#c084fc",label:"Slack"},
  ia:         {fill:"#002040",stroke:"#67e8f9",label:"IA"},
  fluxo:      {fill:"#304030",stroke:"#86efac",label:"Fluxos/Templates"},
};

const STATUS_STYLES = {
  stable:  {ring:"#22c55e",label:"Estável"},
  warning: {ring:"#f59e0b",label:"Atenção"},
  error:   {ring:"#ef4444",label:"Erro"},
  building:{ring:"#3b82f6",label:"Em construção"},
};

/* ============================================================
   CATEGORY POSITIONS (force grouping)
   ============================================================ */
const CAT_POS = {
  pagina:     {x:.15,y:.25},
  componente: {x:.35,y:.35},
  contexto:   {x:.2, y:.55},
  hook:       {x:.35,y:.6},
  lib:        {x:.5, y:.5},
  util:       {x:.55,y:.6},
  gas:        {x:.6, y:.35},
  google:     {x:.75,y:.3},
  uipath:     {x:.85,y:.55},
  sistema:    {x:.9, y:.35},
  slack:      {x:.75,y:.65},
  ia:         {x:.5, y:.2},
  fluxo:      {x:.6, y:.75},
};

/* ============================================================
   STATE
   ============================================================ */
let selectedNode = null;
let activeFilters = new Set();
let labelsVisible = true;
let searchTerm = '';

const {nodes, links} = GRAPH_DATA;
const nodeById = new Map(nodes.map(n => [n.id, n]));

/* ============================================================
   SIZING
   ============================================================ */
function nodeRadius(n) {
  const base = {pagina:18,componente:14,contexto:13,hook:12,lib:12,util:12,gas:16,google:14,uipath:15,sistema:13,slack:12,ia:14,fluxo:11};
  return base[n.category] || 12;
}

/* ============================================================
   BUILD UI
   ============================================================ */
// Filters
const filtersEl = document.getElementById('filters');
const cats = [...new Set(nodes.map(n => n.category))];
cats.forEach(cat => {
  const c = CATEGORY_COLORS[cat] || {stroke:'#888',label:cat};
  const btn = document.createElement('button');
  btn.className = 'tb-pill';
  btn.textContent = c.label;
  btn.style.borderColor = c.stroke + '66';
  btn.addEventListener('click', () => {
    if (activeFilters.has(cat)) { activeFilters.delete(cat); btn.classList.remove('active'); }
    else { activeFilters.add(cat); btn.classList.add('active'); }
    applyFilters();
  });
  filtersEl.appendChild(btn);
});

// Legend
const legendEl = document.getElementById('legend');
legendEl.innerHTML = '<div class="leg-title">Categorias</div>' +
  cats.map(cat => {
    const c = CATEGORY_COLORS[cat] || {stroke:'#888',label:cat};
    return `<div class="leg-item" data-cat="${cat}"><div class="leg-dot" style="background:${c.stroke}"></div>${c.label}</div>`;
  }).join('');
legendEl.querySelectorAll('.leg-item').forEach(el => {
  el.addEventListener('click', () => {
    const cat = el.dataset.cat;
    const pills = filtersEl.querySelectorAll('.tb-pill');
    const idx = cats.indexOf(cat);
    if (idx >= 0 && pills[idx]) pills[idx].click();
  });
});

// Metrics
const metricsEl = document.getElementById('metrics');
const catCounts = {};
nodes.forEach(n => { catCounts[n.category] = (catCounts[n.category]||0)+1; });
metricsEl.innerHTML = `
  <div class="met-title">Grafo</div>
  <div class="met-row"><span>Nós</span><span class="met-val">${nodes.length}</span></div>
  <div class="met-row"><span>Links</span><span class="met-val">${links.length}</span></div>
  <div class="met-divider"></div>
  ${cats.map(c => `<div class="met-row"><span>${(CATEGORY_COLORS[c]||{label:c}).label}</span><span class="met-val">${catCounts[c]||0}</span></div>`).join('')}
  <div class="met-divider"></div>
  <div class="met-row"><span>Versão</span><span class="met-val">${GRAPH_DATA.meta.versao}</span></div>
  <div class="met-row"><span>Atualizado</span><span class="met-val">${GRAPH_DATA.meta.ultimaAtualizacao}</span></div>
  ${GRAPH_DATA.meta.deployUrl && GRAPH_DATA.meta.deployUrl !== 'DEPLOY_URL' ? `<a class="met-url" href="${GRAPH_DATA.meta.deployUrl}" target="_blank">Abrir plataforma ↗</a>` : ''}
`;

/* ============================================================
   D3 SETUP
   ============================================================ */
const svg = d3.select('#graph');
const W = window.innerWidth;
const H = window.innerHeight - 48;
svg.attr('viewBox', `0 0 ${W} ${H}`);

const g = svg.append('g');

// Zoom
const zoomBehavior = d3.zoom().scaleExtent([.15, 4]).on('zoom', e => {
  g.attr('transform', e.transform);
  updateMinimap(e.transform);
});
svg.call(zoomBehavior);

// Defs
const defs = svg.append('defs');
const glowFilter = defs.append('filter').attr('id','glow').attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
glowFilter.append('feGaussianBlur').attr('stdDeviation','3').attr('result','blur');
const fm = glowFilter.append('feMerge');
fm.append('feMergeNode').attr('in','blur');
fm.append('feMergeNode').attr('in','SourceGraphic');

// Starfield
for (let i = 0; i < 200; i++) {
  g.append('circle')
    .attr('cx', Math.random()*W*2.5 - W*.75)
    .attr('cy', Math.random()*H*2.5 - H*.75)
    .attr('r', Math.random()*1)
    .attr('fill','#fff')
    .attr('opacity', Math.random()*.3+.03);
}

/* ============================================================
   SIMULATION
   ============================================================ */
const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d=>d.id).distance(d => {
    const base = 80;
    return base + (4 - (d.strength||2)) * 30;
  }).strength(d => (d.strength||2) * .15))
  .force('charge', d3.forceManyBody().strength(d => d.external ? -200 : -350))
  .force('center', d3.forceCenter(W/2, H/2).strength(.05))
  .force('collision', d3.forceCollide().radius(d => nodeRadius(d) + 12))
  .force('x', d3.forceX(d => (CAT_POS[d.category]?.x || .5) * W).strength(.08))
  .force('y', d3.forceY(d => (CAT_POS[d.category]?.y || .5) * H).strength(.08))
  .alphaDecay(.015);

// Links
const linkEls = g.append('g').selectAll('line').data(links).join('line')
  .attr('class','link-line')
  .attr('stroke', d => {
    const n = nodeById.get(d.source.id || d.source);
    return (CATEGORY_COLORS[n?.category]||{stroke:'#555'}).stroke;
  })
  .attr('stroke-width', d => Math.max(.5, (d.strength||2) * .6));

// Nodes
const nodeEls = g.append('g').selectAll('g').data(nodes).join('g')
  .attr('class','node-g')
  .style('animation', (d,i) => `fadeScale .4s ${i*15}ms both`)
  .call(d3.drag()
    .on('start', (e,d) => { if(!e.active) simulation.alphaTarget(.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
    .on('end',   (e,d) => { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; })
  )
  .on('click', onNodeClick)
  .on('mouseover', onMouseOver)
  .on('mouseout', onMouseOut);

// Status ring
nodeEls.append('circle')
  .attr('r', d => nodeRadius(d) + 3)
  .attr('fill','none')
  .attr('stroke', d => (STATUS_STYLES[d.status]||STATUS_STYLES.stable).ring)
  .attr('stroke-width', .8)
  .attr('stroke-dasharray', d => d.status === 'warning' ? '3 2' : 'none')
  .attr('opacity', .5);

// Main circle
nodeEls.append('circle')
  .attr('r', d => nodeRadius(d))
  .attr('fill', d => (CATEGORY_COLORS[d.category]||{fill:'#333'}).fill)
  .attr('stroke', d => (CATEGORY_COLORS[d.category]||{stroke:'#888'}).stroke)
  .attr('stroke-width', 1.2)
  .attr('filter','url(#glow)');

// External indicator (dashed outer ring)
nodeEls.filter(d => d.external).append('circle')
  .attr('r', d => nodeRadius(d) + 7)
  .attr('fill','none')
  .attr('stroke', d => (CATEGORY_COLORS[d.category]||{stroke:'#888'}).stroke)
  .attr('stroke-width', .4)
  .attr('stroke-dasharray', '4 3')
  .attr('opacity', .35);

// Labels
nodeEls.append('text')
  .attr('text-anchor','middle')
  .attr('dy', d => nodeRadius(d) + 13)
  .text(d => d.label);

// Tick
simulation.on('tick', () => {
  linkEls.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeEls.attr('transform', d=>`translate(${d.x},${d.y})`);
});

/* ============================================================
   INTERACTIONS
   ============================================================ */
const tooltip = document.getElementById('tooltip');
const detailPanel = document.getElementById('detail-panel');

function onMouseOver(event, d) {
  if (selectedNode) return;
  highlightNode(d);
  showTooltip(event, d);
}

function onMouseOut() {
  if (selectedNode) return;
  clearHighlight();
  tooltip.style.display = 'none';
}

function showTooltip(event, d) {
  tooltip.innerHTML = `<div class="tt-name">${d.label}</div><div class="tt-desc">${d.desc.slice(0,100)}${d.desc.length>100?'...':''}</div>`;
  tooltip.style.display = 'block';
  const r = tooltip.getBoundingClientRect();
  let x = event.clientX + 14;
  let y = event.clientY - 10;
  if (x + r.width > window.innerWidth - 10) x = event.clientX - r.width - 14;
  if (y + r.height > window.innerHeight - 10) y = window.innerHeight - r.height - 10;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function highlightNode(d) {
  const connected = new Set([d.id]);
  links.forEach(l => {
    const s = l.source.id||l.source, t = l.target.id||l.target;
    if (s===d.id) connected.add(t);
    if (t===d.id) connected.add(s);
  });
  nodeEls.classed('dimmed', n => !connected.has(n.id));
  linkEls.classed('dimmed', l => {
    const s = l.source.id||l.source, t = l.target.id||l.target;
    return !(s===d.id||t===d.id);
  });
  linkEls.classed('highlight', l => {
    const s = l.source.id||l.source, t = l.target.id||l.target;
    return s===d.id||t===d.id;
  });
}

function clearHighlight() {
  nodeEls.classed('dimmed', false);
  linkEls.classed('dimmed', false).classed('highlight', false);
}

function onNodeClick(event, d) {
  event.stopPropagation();
  if (selectedNode === d.id) { closeDetail(); return; }
  selectedNode = d.id;
  highlightNode(d);
  tooltip.style.display = 'none';
  openDetail(d);
}

svg.on('click', () => { if(selectedNode) closeDetail(); });

function openDetail(d) {
  const cc = CATEGORY_COLORS[d.category]||{stroke:'#888',label:d.category};
  const ss = STATUS_STYLES[d.status]||STATUS_STYLES.stable;

  const inLinks = links.filter(l => (l.target.id||l.target)===d.id);
  const outLinks = links.filter(l => (l.source.id||l.source)===d.id);

  detailPanel.innerHTML = `
    <div class="dp-header">
      <div>
        <div class="dp-cat-badge" style="background:${cc.fill};color:${cc.stroke};border:.5px solid ${cc.stroke}66">${cc.label}${d.subcategory ? ' · '+d.subcategory : ''}</div>
        <div class="dp-title">${d.label}</div>
        <div class="dp-status"><span style="width:6px;height:6px;border-radius:50%;background:${ss.ring};display:inline-block"></span> ${ss.label}${d.external ? ' · Externo' : ''}</div>
      </div>
      <button class="dp-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="dp-body">
      <div><div class="dp-section-title">Descrição</div><div class="dp-desc">${d.desc}</div></div>
      ${d.features && d.features.length ? `<div><div class="dp-section-title">Features</div>${d.features.map(f=>`<div class="dp-feature">${f}</div>`).join('')}</div>` : ''}
      ${d.file ? `<div><div class="dp-section-title">Arquivo</div><div class="dp-file">${d.file}</div></div>` : ''}
      ${inLinks.length ? `<div><div class="dp-section-title">Recebe de (${inLinks.length})</div>${inLinks.map(l=>{
        const src = nodeById.get(l.source.id||l.source);
        return `<div class="dp-conn"><span class="dp-conn-arrow">←</span> ${src?.label||l.source.id||l.source}<span class="dp-conn-label">${l.label||''}</span></div>`;
      }).join('')}</div>` : ''}
      ${outLinks.length ? `<div><div class="dp-section-title">Envia para (${outLinks.length})</div>${outLinks.map(l=>{
        const tgt = nodeById.get(l.target.id||l.target);
        return `<div class="dp-conn"><span class="dp-conn-arrow">→</span> ${tgt?.label||l.target.id||l.target}<span class="dp-conn-label">${l.label||''}</span></div>`;
      }).join('')}</div>` : ''}
    </div>
  `;
  detailPanel.classList.add('open');
}

function closeDetail() {
  selectedNode = null;
  clearHighlight();
  detailPanel.classList.remove('open');
}

/* ============================================================
   FILTERS & SEARCH
   ============================================================ */
function applyFilters() {
  const hasFilter = activeFilters.size > 0;
  const term = searchTerm.toLowerCase();

  nodeEls.style('display', d => {
    const catOk = !hasFilter || activeFilters.has(d.category);
    const searchOk = !term || d.label.toLowerCase().includes(term) || d.id.toLowerCase().includes(term) || d.desc.toLowerCase().includes(term);
    return (catOk && searchOk) ? null : 'none';
  });

  const visibleIds = new Set();
  nodeEls.each(function(d) { if (d3.select(this).style('display') !== 'none') visibleIds.add(d.id); });

  linkEls.style('display', l => {
    const s = l.source.id||l.source, t = l.target.id||l.target;
    return (visibleIds.has(s) && visibleIds.has(t)) ? null : 'none';
  });
}

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value;
  applyFilters();
  if (searchTerm) {
    const term = searchTerm.toLowerCase();
    nodeEls.each(function(d) {
      const match = d.label.toLowerCase().includes(term) || d.id.toLowerCase().includes(term);
      d3.select(this).select('circle:nth-child(2)').attr('stroke-width', match ? 2.5 : 1.2);
    });
  } else {
    nodeEls.select('circle:nth-child(2)').attr('stroke-width', 1.2);
  }
});

/* ============================================================
   CONTROLS
   ============================================================ */
document.getElementById('btn-zoom-in').addEventListener('click', () => svg.transition().duration(300).call(zoomBehavior.scaleBy, 1.4));
document.getElementById('btn-zoom-out').addEventListener('click', () => svg.transition().duration(300).call(zoomBehavior.scaleBy, .7));
document.getElementById('btn-reset').addEventListener('click', () => svg.transition().duration(500).call(zoomBehavior.transform, d3.zoomIdentity));
document.getElementById('btn-labels').addEventListener('click', () => {
  labelsVisible = !labelsVisible;
  nodeEls.selectAll('text').style('display', labelsVisible ? null : 'none');
});

/* ============================================================
   MINIMAP
   ============================================================ */
const mmCanvas = document.querySelector('#minimap canvas');
const mmCtx = mmCanvas.getContext('2d');
const mmViewport = document.querySelector('.mm-viewport');
const mmW = 160, mmH = 100;

function updateMinimap(transform) {
  mmCtx.clearRect(0,0,mmW,mmH);

  const ext = {minX:Infinity,minY:Infinity,maxX:-Infinity,maxY:-Infinity};
  nodes.forEach(n => {
    if (n.x!=null) { ext.minX=Math.min(ext.minX,n.x); ext.maxX=Math.max(ext.maxX,n.x); ext.minY=Math.min(ext.minY,n.y); ext.maxY=Math.max(ext.maxY,n.y); }
  });

  const pad = 40;
  const gw = (ext.maxX-ext.minX)+pad*2 || 1;
  const gh = (ext.maxY-ext.minY)+pad*2 || 1;
  const sx = mmW/gw, sy = mmH/gh;
  const s = Math.min(sx,sy);

  // Draw links
  mmCtx.strokeStyle = 'rgba(130,10,209,.15)';
  mmCtx.lineWidth = .5;
  links.forEach(l => {
    if (l.source.x==null) return;
    mmCtx.beginPath();
    mmCtx.moveTo((l.source.x-ext.minX+pad)*s,(l.source.y-ext.minY+pad)*s);
    mmCtx.lineTo((l.target.x-ext.minX+pad)*s,(l.target.y-ext.minY+pad)*s);
    mmCtx.stroke();
  });

  // Draw nodes
  nodes.forEach(n => {
    if (n.x==null) return;
    const cc = CATEGORY_COLORS[n.category]||{stroke:'#888'};
    mmCtx.fillStyle = cc.stroke;
    mmCtx.globalAlpha = .7;
    mmCtx.beginPath();
    mmCtx.arc((n.x-ext.minX+pad)*s,(n.y-ext.minY+pad)*s, Math.max(1.5, nodeRadius(n)*s*.5), 0, Math.PI*2);
    mmCtx.fill();
    mmCtx.globalAlpha = 1;
  });

  // Viewport rectangle
  if (transform) {
    const vx = (-transform.x/transform.k - ext.minX + pad)*s;
    const vy = (-transform.y/transform.k - ext.minY + pad)*s;
    const vw = (W/transform.k)*s;
    const vh = (H/transform.k)*s;
    mmViewport.style.left = Math.max(0,vx)+'px';
    mmViewport.style.top = Math.max(0,vy)+'px';
    mmViewport.style.width = Math.min(mmW, vw)+'px';
    mmViewport.style.height = Math.min(mmH, vh)+'px';
    mmViewport.style.display = 'block';
  }
}

// Initial minimap after simulation stabilizes
simulation.on('tick.minimap', () => { updateMinimap(d3.zoomTransform(svg.node())); });

/* ============================================================
   RESIZE
   ============================================================ */
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight - 48;
  svg.attr('viewBox', `0 0 ${w} ${h}`);
  simulation.force('center', d3.forceCenter(w/2, h/2)).alpha(.2).restart();
});
